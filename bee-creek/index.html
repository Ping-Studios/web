function SpeedBars({ filled, total = 8, color = "#1a1a2e" }) {
  return (
    <div style={{ display: "flex", gap: "3px", alignItems: "center" }}>
      {Array.from({ length: total }).map((_, i) => (
        <div key={i} style={{
          width: "22px", height: "8px", borderRadius: "2px",
          background: i < filled ? color : "#dde1e8",
          transition: "background 0.3s"
        }} />
      ))}
    </div>
  );
}

function FormPage({ onSubmit }) {
  const [name, setName] = useState("James Thornton");
  const [address, setAddress] = useState("603 FM 2093, Fredericksburg, TX 78624");
  const [email, setEmail] = useState("james.thornton@gmail.com");
  const [phone, setPhone] = useState("(830) 555-0147");
  const [showDrop, setShowDrop] = useState(false);
  const [filtered, setFiltered] = useState([]);
  const ref = useRef(null);

  useEffect(() => {
    const h = e => { if (ref.current && !ref.current.contains(e.target)) setShowDrop(false); };
    document.addEventListener("mousedown", h);
    return () => document.removeEventListener("mousedown", h);
  }, []);

  const onAddr = v => {
    setAddress(v);
    if (v.length >= 1) {
      const f = SAMPLE_ADDRESSES.filter(a => a.toLowerCase().includes(v.toLowerCase()));
      setFiltered(f.length ? f : SAMPLE_ADDRESSES.slice(0, 5));
      setShowDrop(true);
    } else setShowDrop(false);
  };

  const fmtPhone = v => {
    const d = v.replace(/\D/g, "").slice(0, 10);
    if (d.length >= 7) return "(" + d.slice(0,3) + ") " + d.slice(3,6) + "-" + d.slice(6);
    if (d.length >= 4) return "(" + d.slice(0,3) + ") " + d.slice(3);
    return d.length > 0 ? "(" + d : "";
  };

  const submit = () => { onSubmit({ name, address, email, phone }); };

  const inp = (err) => ({
    width: "100%", padding: "13px 15px", fontSize: "14px",
    border: "2px solid " + (err ? "#e74c3c" : "#e0e3e8"), borderRadius: "9px",
    outline: "none", fontFamily: "var(--f-body)", background: "#fff",
    boxSizing: "border-box", transition: "border .2s, box-shadow .2s"
  });

  return (
    <div style={{ minHeight: "100vh", background: "linear-gradient(160deg,#1a1a2e 0%,#16213e 50%,#1a1a2e 100%)", display: "flex", flexDirection: "column", alignItems: "center" }}>

        <span>Top Rated Local Service</span>
        <span>Unlimited Data</span>
        <span>Connecting You Since '52</span>
      </div>
      <div style={{ flex: 1, display: "flex", alignItems: "center", justifyContent: "center", padding: "28px 16px 24px", width: "100%", maxWidth: "480px" }}>
        <div style={{ width: "100%" }}>
          <div style={{ textAlign: "center", marginBottom: 24 }}>
            <div style={{ display: "inline-block", background: "rgba(240,192,64,.15)", color: "#f0c040", fontSize: "11px", fontWeight: 700, letterSpacing: "2px", textTransform: "uppercase", padding: "5px 14px", borderRadius: "16px", marginBottom: 10, fontFamily: "var(--f-head)" }}>Check Availability</div>
            <h1 style={{ color: "#fff", fontSize: "clamp(24px,5vw,32px)", fontWeight: 800, margin: "0 0 6px", fontFamily: "var(--f-head)", lineHeight: 1.15 }}>Get Connected Today</h1>
            <p style={{ color: "rgba(255,255,255,.45)", fontSize: "14px", margin: 0 }}>See if high-speed internet is available at your address.</p>
          </div>
          <div style={{ background: "#fff", borderRadius: "14px", padding: "28px 24px", boxShadow: "0 20px 50px rgba(0,0,0,.3)" }}>
            <div style={{ marginBottom: 16 }}>
              <label style={{ display: "block", fontSize: "12px", fontWeight: 700, color: "#1a1a2e", marginBottom: 5, fontFamily: "var(--f-head)" }}>Full Name</label>
              <input placeholder="John Smith" value={name} onChange={e => setName(e.target.value)} style={inp(false)} onFocus={e => e.target.style.borderColor = "#f0c040"} onBlur={e => e.target.style.borderColor = "#e0e3e8"} />
            </div>
            <div style={{ marginBottom: 16, position: "relative" }} ref={ref}>
              <label style={{ display: "block", fontSize: "12px", fontWeight: 700, color: "#1a1a2e", marginBottom: 5, fontFamily: "var(--f-head)" }}>Service Address</label>
              <input placeholder="Start typing your address..." value={address} onChange={e => onAddr(e.target.value)} onFocus={() => { if (address) setShowDrop(true); }} style={inp(false)} />
              {showDrop && filtered.length > 0 && (
                <div style={{ position: "absolute", top: "100%", left: 0, right: 0, background: "#fff", border: "2px solid #f0c040", borderRadius: "9px", marginTop: 3, boxShadow: "0 10px 28px rgba(0,0,0,.12)", zIndex: 10, maxHeight: 200, overflow: "auto" }}>
                  {filtered.map((a, i) => (
                    <div key={i} onClick={() => { setAddress(a); setShowDrop(false); }}
                      style={{ padding: "11px 14px", cursor: "pointer", fontSize: "13px", color: "#1a1a2e", borderBottom: i < filtered.length - 1 ? "1px solid #f5f5f5" : "none" }}
                      onMouseEnter={e => e.target.style.background = "#fffbeb"}
                      onMouseLeave={e => e.target.style.background = "#fff"}>
                      {a}
                    </div>
                  ))}
                </div>
              )}
            </div>
            <div style={{ marginBottom: 16 }}>
              <label style={{ display: "block", fontSize: "12px", fontWeight: 700, color: "#1a1a2e", marginBottom: 5, fontFamily: "var(--f-head)" }}>Email Address</label>
              <input type="email" placeholder="you@email.com" value={email} onChange={e => setEmail(e.target.value)} style={inp(false)} onFocus={e => e.target.style.borderColor = "#f0c040"} onBlur={e => e.target.style.borderColor = "#e0e3e8"} />
            </div>
            <div style={{ marginBottom: 20 }}>
              <label style={{ display: "block", fontSize: "12px", fontWeight: 700, color: "#1a1a2e", marginBottom: 5, fontFamily: "var(--f-head)" }}>Phone Number</label>
              <input type="tel" placeholder="(830) 555-1234" value={phone} onChange={e => setPhone(fmtPhone(e.target.value))} style={inp(false)} onFocus={e => e.target.style.borderColor = "#f0c040"} onBlur={e => e.target.style.borderColor = "#e0e3e8"} />
            </div>
            <button onClick={submit} style={{ width: "100%", padding: "15px", background: "#f0c040", color: "#1a1a2e", border: "none", borderRadius: "9px", fontSize: "15px", fontWeight: 700, cursor: "pointer", fontFamily: "var(--f-head)", letterSpacing: ".4px", boxShadow: "0 4px 14px rgba(240,192,64,.4)", transition: "all .2s" }}
              onMouseEnter={e => { e.target.style.background = "#e6b435"; e.target.style.transform = "translateY(-1px)"; }}
              onMouseLeave={e => { e.target.style.background = "#f0c040"; e.target.style.transform = "none"; }}>
              Check Availability
            </button>
            <p style={{ textAlign: "center", fontSize: "10px", color: "#aaa", marginTop: 10, lineHeight: 1.4 }}>By submitting, you agree to be contacted by Bee Creek Communications.</p>
          </div>
        </div>
      </div>
    </div>
  );
}

            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 2 }}>
              <div>
                <div style={{ fontSize: "19px", fontWeight: 800, color: "#1a1a2e", fontFamily: "var(--f-head)" }}>{p.tier}</div>
                <div style={{ fontSize: "9px", fontWeight: 700, letterSpacing: "1.2px", color: "#999", fontFamily: "var(--f-head)" }}>{p.sub}</div>
              </div>
            </div>
            <div style={{ display: "flex", alignItems: "baseline", gap: 1, margin: "8px 0 2px" }}>
              <span style={{ fontSize: "12px", color: "#999", fontWeight: 600, alignSelf: "flex-start", marginTop: 4 }}>$</span>
              <span style={{ fontSize: "40px", fontWeight: 800, color: "#1a1a2e", fontFamily: "var(--f-head)", lineHeight: 1 }}>{p.price.split(".")[0]}</span>
              <span style={{ fontSize: "15px", fontWeight: 700, color: "#1a1a2e", fontFamily: "var(--f-head)" }}>.{p.price.split(".")[1]}</span>
              <span style={{ fontSize: "12px", color: "#999", marginLeft: 2 }}>/mo</span>
            </div>
            <div style={{ display: "inline-flex", alignItems: "center", gap: 4, color: "#27ae60", fontSize: "10px", fontWeight: 600, marginBottom: 12 }}>
              <span style={{ fontSize: "9px" }}>&#9679;</span> Unlimited Data
            </div>
            <div style={{ marginBottom: 6 }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 5 }}>
                <span style={{ fontSize: "10px", fontWeight: 600, color: "#999", letterSpacing: ".3px" }}>DOWNLOAD SPEED</span>
                <span style={{ fontSize: "14px", fontWeight: 800, color: "#1a1a2e", fontFamily: "var(--f-head)" }}>{p.speed} Mbps</span>
              </div>
              <SpeedBars filled={p.bars} color="#1a1a2e" />
            </div>
            <div style={{ marginBottom: 14 }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 5 }}>
                <span style={{ fontSize: "10px", fontWeight: 600, color: "#999", letterSpacing: ".3px" }}>UPLOAD SPEED</span>
                <span style={{ fontSize: "14px", fontWeight: 800, color: "#1a1a2e", fontFamily: "var(--f-head)" }}>{p.upload} Mbps</span>
              </div>
              <SpeedBars filled={Math.max(1, Math.floor(p.bars * .5))} color="#4a90d9" />
            </div>
            <button onClick={() => setLabelPlan(p)} style={{
              width: "100%", padding: "11px",
              background: p.popular ? "#1a1a2e" : "#f7f8fa",
              color: p.popular ? "#fff" : "#1a1a2e",
              border: p.popular ? "none" : "1px solid #e0e3e8",
              borderRadius: "9px", fontSize: "13px", fontWeight: 700,
              cursor: "pointer", fontFamily: "var(--f-head)",
              transition: "all .2s", letterSpacing: ".3px"
            }}
            onMouseEnter={e => e.target.style.opacity = ".85"}
            onMouseLeave={e => e.target.style.opacity = "1"}>
              {"Select " + p.tier}
            </button>
            <button onClick={() => setLabelPlan(p)} style={{
              width: "100%", padding: "6px", background: "none", border: "none",
              color: "#4a90d9", fontSize: "11px", fontWeight: 600, cursor: "pointer",
              fontFamily: "var(--f-head)", marginTop: 4
            }}>
              View Broadband Facts
            </button>
          </div>
        ))}
      </div>

      <div style={{ textAlign: "center", padding: "4px 0 16px" }}>
        <button onClick={() => setShowAll(!showAll)} style={{
          background: "none", border: "1px solid #ccc", borderRadius: "8px",
          padding: "8px 20px", fontSize: "12px", fontWeight: 600, color: "#666",
          cursor: "pointer", fontFamily: "var(--f-head)"
        }}>
          {showAll ? "Show Fewer Plans" : "View All " + ALL_PLANS.length + " Plans"}
        </button>
      </div>

      {showAll && (
        <div style={{ maxWidth: 800, margin: "0 auto 20px", padding: "0 20px" }}>
          <div style={{ background: "#fff", borderRadius: "12px", border: "1px solid #e8eaed", overflow: "hidden" }}>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr 1fr auto", padding: "12px 20px", background: "#f7f8fa", borderBottom: "1px solid #e8eaed" }}>
              {["Plan", "Download", "Upload", "Price", ""].map((h, i) => (
                <div key={i} style={{ fontSize: "10px", fontWeight: 700, color: "#999", letterSpacing: "1px", fontFamily: "var(--f-head)" }}>{h}</div>
              ))}
            </div>
            {ALL_PLANS.map((p, i) => (
              <div key={i} style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr 1fr auto", padding: "12px 20px", borderBottom: i < ALL_PLANS.length - 1 ? "1px solid #f0f0f0" : "none", alignItems: "center" }}>
                <div style={{ fontSize: "13px", fontWeight: 700, color: "#1a1a2e", fontFamily: "var(--f-head)" }}>{p.name}</div>
                <div style={{ fontSize: "13px", color: "#555" }}>{p.speed} Mbps</div>
                <div style={{ fontSize: "13px", color: "#555" }}>{p.upload} Mbps</div>
                <div style={{ fontSize: "13px", fontWeight: 700, color: "#1a1a2e" }}>{"$" + p.price + "/mo"}</div>
                <button onClick={() => setLabelPlan(p)} style={{
                  background: "none", border: "1px solid #dde1e8", borderRadius: "6px",
                  padding: "5px 10px", fontSize: "10px", fontWeight: 700, color: "#4a90d9",
                  cursor: "pointer", fontFamily: "var(--f-head)", whiteSpace: "nowrap"
                }}>Facts</button>
              </div>
            ))}
          </div>
        </div>
      )}

      <div style={{ background: "#1a1a2e", padding: "28px 20px 20px" }}>
        <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(200px, 1fr))", gap: 24, maxWidth: 900, margin: "0 auto", textAlign: "center" }}>
          {[
            { t: "Local Support", d: "Real people right here in Central Texas. No massive call centers, just neighbors helping neighbors." },
            { t: "Unlimited Means Unlimited", d: "No data caps, no throttling, and no surprise overage fees. Just pure speed." },
            { t: "Satisfaction Guaranteed", d: "30-Day Money-Back Guarantee. We're confident you'll love Bee Creek." },
          ].map((b, i) => (
            <div key={i}>
              <div style={{ fontSize: "14px", fontWeight: 700, color: "#fff", fontFamily: "var(--f-head)", marginBottom: 5 }}>{b.t}</div>
              <div style={{ fontSize: "12px", color: "rgba(255,255,255,.5)", lineHeight: 1.6 }}>{b.d}</div>
            </div>
          ))}
        </div>

        <div style={{ textAlign: "center", marginTop: 24, paddingTop: 20, borderTop: "1px solid rgba(255,255,255,.08)" }}>
          <p style={{ fontSize: "13px", color: "rgba(255,255,255,.5)", margin: "0 0 4px" }}>A Bee Creek representative will reach out shortly to get you connected.</p>
          <a href="tel:8669901258" style={{ color: "#f0c040", fontWeight: 700, fontSize: "15px", textDecoration: "none", fontFamily: "var(--f-head)" }}>(866) 990-1258</a>
        </div>

        <div style={{
          maxWidth: 700, margin: "24px auto 0",
          display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(160px, 1fr))",
          gap: 20, paddingTop: 20, borderTop: "1px solid rgba(255,255,255,.08)"
        }}>
          <div>
            <div style={{ fontSize: "11px", fontWeight: 700, letterSpacing: "1px", color: "#f0c040", fontFamily: "var(--f-head)", marginBottom: 6 }}>CONTACT</div>
            <div style={{ fontSize: "12px", color: "rgba(255,255,255,.5)", lineHeight: 1.8 }}>
              <div>Toll Free: <a href="tel:8669901258" style={{ color: "rgba(255,255,255,.7)", textDecoration: "none" }}>(866) 990-1258</a></div>
              <div>Local: <a href="tel:8309901258" style={{ color: "rgba(255,255,255,.7)", textDecoration: "none" }}>(830) 990-1258</a></div>
              <div>Fax: (830) 990-5088</div>
            </div>
          </div>
          <div>
            <div style={{ fontSize: "11px", fontWeight: 700, letterSpacing: "1px", color: "#f0c040", fontFamily: "var(--f-head)", marginBottom: 6 }}>ADDRESS</div>
            <div style={{ fontSize: "12px", color: "rgba(255,255,255,.5)", lineHeight: 1.8 }}>
              <div>603 FM 2093 Ste #1103</div>
              <div>Fredericksburg, TX 78624</div>
              <div>P.O. Box 1757</div>
            </div>
          </div>
          <div>
            <div style={{ fontSize: "11px", fontWeight: 700, letterSpacing: "1px", color: "#f0c040", fontFamily: "var(--f-head)", marginBottom: 6 }}>HOURS</div>
            <div style={{ fontSize: "12px", color: "rgba(255,255,255,.5)", lineHeight: 1.8 }}>
              <div>Mon - Fri</div>
              <div>8:00 AM - 5:00 PM</div>
              <div style={{ color: "#f0c040", fontSize: "11px", fontWeight: 600 }}>After Hours Support Available</div>
            </div>
          </div>
        </div>

        <div style={{ textAlign: "center", marginTop: 24, paddingTop: 16, borderTop: "1px solid rgba(255,255,255,.06)" }}>
          <div style={{ fontSize: "16px", fontWeight: 800, color: "rgba(255,255,255,.4)", fontFamily: "var(--f-head)", letterSpacing: ".5px" }}>
            Bee Creek <span style={{ color: "rgba(240,192,64,.4)" }}>Communications</span>
          </div>
          <div style={{ fontSize: "11px", color: "#f0c040", fontFamily: "var(--f-head)", fontWeight: 600, marginTop: 4, letterSpacing: "1px" }}>Connecting You Since '52</div>
          <p style={{ fontSize: "10px", color: "rgba(255,255,255,.2)", marginTop: 4 }}>&copy; Bee Creek Communications, Inc. | All Rights Reserved</p>
        </div>
      </div>

      {labelPlan && <BroadbandLabel plan={labelPlan} onClose={() => setLabelPlan(null)} />}
    </div>
  );
}

function App() {
  const [page, setPage] = useState("form");
  const [userData, setUserData] = useState(null);

  return (
    <>
      {page === "form"
        ? <FormPage onSubmit={d => { setUserData(d); setPage("congrats"); window.scrollTo(0,0); }} />
        : <CongratsPage userData={userData} />
      }
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
