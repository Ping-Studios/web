  /* ─── Style Variant Overrides ─── */
  :root { --card-radius: 14px; --card-border-w: 1px; --card-shadow: ; --card-backdrop: none; --card-bg-opacity: 1; }
  [data-card-layout="stack"] .plan-grid { grid-template-columns: 1fr !important; max-width: 480px !important; }

  /* ─── Gear & Settings Panel ─── */
  #gear-btn {
    position: fixed; top: 12px; right: 12px; z-index: 10000;
    width: 38px; height: 38px; border-radius: 50%;
    background: var(--bg-card, #fff); border: 1px solid var(--border, #e8eaed);
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; cursor: pointer; transition: all .2s;
    box-shadow: 0 2px 8px rgba(0,0,0,.1); color: var(--text-secondary, #666);
  }
  #gear-btn:hover { transform: rotate(30deg); }
  #gear-btn.active { border-color: var(--accent); color: var(--accent); }

  #settings-panel {
    position: fixed; top: 0; right: 0; width: 320px; height: 100vh;
    background: var(--bg-card, #fff); border-left: 1px solid var(--border, #e8eaed);
    z-index: 9999; transform: translateX(100%); transition: transform .3s ease;
    overflow-y: auto; box-shadow: -4px 0 20px rgba(0,0,0,.08);
  }
  #settings-panel.open { transform: translateX(0); }

  .sp-section { padding: 16px 18px; border-bottom: 1px solid var(--border, #e8eaed); }
  .sp-label { font-size: 10px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase;
    color: var(--text-muted, #999); margin-bottom: 10px; font-family: var(--f-head); }
  .sp-close { position: absolute; top: 12px; right: 14px; background: none; border: none;
    font-size: 18px; cursor: pointer; color: var(--text-muted); }

  .theme-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
  .theme-swatch {
    width: 100%; aspect-ratio: 1; border-radius: 8px; cursor: pointer;
    border: 2px solid transparent; transition: all .2s;
    display: flex; align-items: center; justify-content: center;
    font-size: 9px; font-weight: 700; font-family: var(--f-head);
    letter-spacing: .5px; text-transform: uppercase;
  }
  .theme-swatch:hover { transform: scale(1.05); }
  .theme-swatch.active { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-dim); }

  .color-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  .color-row label { font-size: 11px; font-weight: 600; color: var(--text-secondary); flex: 1; }
  .color-row input[type="color"] { width: 32px; height: 28px; border: 1px solid var(--border);

function getZoneForAddress(address, zones) {
  const match = address.match(/\b(\d{5})\b/);
  if (match) {
    for (const [id, zone] of Object.entries(zones)) {
      if (zone.zipCodes.includes(match[1])) return id;
    }
  }
  return "zone1";
}

function deepClone(obj) { return JSON.parse(JSON.stringify(obj)); }

function rgbToHex(str) {
  if (!str || str.startsWith('#')) return str || '';
  const m = str.match(/\d+/g);
  if (!m || m.length < 3) return '#000000';
  return '#' + m.slice(0,3).map(n => parseInt(n).toString(16).padStart(2,'0')).join('');
}

function saveAnnotations(anns) {

}

function AnnotationPopover({ annId, existing, onSave, onDelete, onClose }) {
  const [action, setAction] = useState(existing ? existing.action : "");
  const [comment, setComment] = useState(existing ? existing.comment : "");
  const ref = useRef(null);

  useEffect(() => {
    const h = e => { if (ref.current && !ref.current.contains(e.target) && !e.target.classList.contains("ann-btn")) onClose(); };
    setTimeout(() => document.addEventListener("mousedown", h), 10);
    return () => document.removeEventListener("mousedown", h);
  }, [onClose]);

  return (
    <div className="ann-popover" ref={ref} onClick={e => e.stopPropagation()}>
      <div className="ann-pills">
        {ANN_ACTIONS.map(a => (
          <div key={a.key} className={"ann-pill" + (action === a.key ? " sel" : "")}
            onClick={() => setAction(action === a.key ? "" : a.key)}>{a.label}</div>
        ))}
      </div>
      <textarea value={comment} onChange={e => setComment(e.target.value)} placeholder="Add your notes here..." />
      <button className="ann-save" onClick={() => { if (action || comment.trim()) onSave(annId, action, comment.trim()); }}>Save Annotation</button>
      {existing && <button className="ann-del" onClick={() => onDelete(annId)}>Delete Annotation</button>}
    </div>
  );
}

function Annotatable({ id, label, devMode, annotations, onSave, onDelete, children, style }) {
  const [open, setOpen] = useState(false);
  if (!devMode) return <div style={style}>{children}</div>;

  const existing = annotations.find(a => a.id === id);

  return (
    <div className="ann-wrap" style={style}>
      {children}
      <button className={"ann-btn" + (existing ? " has-note" : "")}
        onClick={e => { e.stopPropagation(); setOpen(!open); }}
        title={existing ? (existing.action + ": " + (existing.comment || "").slice(0, 40)) : "Add annotation"}>
        {existing ? "!" : "+"}
      </button>
      {open && (
        <AnnotationPopover
          annId={id}
          existing={existing}
          onSave={(annId, action, comment) => { onSave(annId, label, action, comment); setOpen(false); }}
          onDelete={(annId) => { onDelete(annId); setOpen(false); }}
          onClose={() => setOpen(false)}
        />
      )}
    </div>
  );
}

/* ─── Settings Panel ─── */
function SettingsPanel({ isOpen, theme, customColors, styleVariants, devMode, annotationCount, onThemeChange, onCustomColor, onResetColors, onStyleVariant, onDevUnlock, onDevLock, onAnnClear, onExport, onClose }) {
  const [devPw, setDevPw] = useState("");
  const [devErr, setDevErr] = useState(false);

  const tryUnlock = () => {
    if (devPw === "5555") { onDevUnlock(); setDevPw(""); setDevErr(false); }
    else { setDevErr(true); setTimeout(() => setDevErr(false), 2000); }
  };

  const getComputed = (prop) => {
    const val = document.documentElement.style.getPropertyValue(prop);
    if (val) return rgbToHex(val.trim());
    const computed = getComputedStyle(document.documentElement).getPropertyValue(prop);
    return rgbToHex(computed.trim());
  };

  return (
    <div id="settings-panel" className={isOpen ? "open" : ""}>
      <div style={{ padding: "14px 18px", borderBottom: "1px solid var(--border)", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
        <span style={{ fontSize: "14px", fontWeight: 800, fontFamily: "var(--f-head)", color: "var(--text-primary)" }}>Settings</span>
        <button onClick={onClose} className="sp-close">{"\u2715"}</button>
      </div>

      {/* Themes */}
      <div className="sp-section">
        <div className="sp-label">Brand Theme</div>
        <div className="theme-grid">
          {THEMES.filter(t => t.group === "brand").map(t => (
            <div key={t.id} className={"theme-swatch" + (theme === t.id ? " active" : "")}
              style={{ background: t.bg, color: t.fg, borderColor: theme === t.id ? t.accent : "transparent", gridColumn: "span 2" }}
              onClick={() => onThemeChange(t.id)}>
              <span style={{ borderBottom: "2px solid " + t.accent, paddingBottom: 1 }}>{t.label}</span>
            </div>
          ))}
        </div>
        <div className="sp-label" style={{ marginTop: 14 }}>Light Themes</div>
        <div className="theme-grid">
          {THEMES.filter(t => t.group === "light").map(t => (
            <div key={t.id} className={"theme-swatch" + (theme === t.id ? " active" : "")}
              style={{ background: t.bg, color: t.fg, borderColor: theme === t.id ? t.accent : "transparent" }}
              onClick={() => onThemeChange(t.id)}>
              <span style={{ borderBottom: "2px solid " + t.accent, paddingBottom: 1 }}>{t.label}</span>
            </div>
          ))}
        </div>
        <div className="sp-label" style={{ marginTop: 14 }}>Dark Themes</div>
        <div className="theme-grid">
          {THEMES.filter(t => t.group === "dark").map(t => (
            <div key={t.id} className={"theme-swatch" + (theme === t.id ? " active" : "")}
              style={{ background: t.bg, color: t.fg, borderColor: theme === t.id ? t.accent : "transparent" }}
              onClick={() => onThemeChange(t.id)}>
              <span style={{ borderBottom: "2px solid " + t.accent, paddingBottom: 1 }}>{t.label}</span>
            </div>
          ))}
        </div>
      </div>

      {/* Custom Colors */}
      <div className="sp-section">
        <div className="sp-label">Custom Colors</div>
        {[
          { key: "accent", label: "Accent", prop: "--accent" },
          { key: "bg", label: "Background", prop: "--bg-primary" },
          { key: "card", label: "Cards", prop: "--bg-card" },
          { key: "text", label: "Text", prop: "--text-primary" },
        ].map(c => (
          <div key={c.key} className="color-row">
            <label>{c.label}</label>
            <input type="color" value={customColors[c.key] || getComputed(c.prop)}
              onChange={e => onCustomColor(c.key, c.prop, e.target.value)} />
            <input type="text" value={customColors[c.key] || getComputed(c.prop)}
              onChange={e => { if (/^#[0-9a-fA-F]{0,6}$/.test(e.target.value)) onCustomColor(c.key, c.prop, e.target.value); }} />
            {customColors[c.key] && <button className="reset-btn" onClick={() => onCustomColor(c.key, c.prop, null)} title="Reset">{"\u21BA"}</button>}
          </div>
        ))}
        <div style={{ display: "flex", gap: 8, marginTop: 10 }}>
          <button className="sp-btn sp-btn-ghost" onClick={onResetColors}>Reset All</button>
        </div>
      </div>

      {/* Style Variants (Dev Only) */}
      {devMode && (
        <div className="sp-section">
          <div className="sp-label">Style Variants</div>
          {[
            { key: "cardStyle", label: "Card Style", options: [
              { value: "default", label: "Default" }, { value: "flat", label: "Flat" },
              { value: "bordered", label: "Bold Border" }, { value: "glass", label: "Glass" },
              { value: "raised", label: "Raised" }
            ]},
            { key: "footerStyle", label: "Footer", options: [
              { value: "dark", label: "Dark" }, { value: "light", label: "Light" },
              { value: "accent", label: "Accent Color" }, { value: "match", label: "Match Page" }
            ]},

              { value: "accent", label: "Accent" }

          ].map(v => (
            <div key={v.key} style={{ marginBottom: 10 }}>
              <div style={{ fontSize: "11px", fontWeight: 600, color: "var(--text-secondary)", marginBottom: 4 }}>{v.label}</div>
              <div style={{ display: "flex", flexWrap: "wrap", gap: 4 }}>
                {v.options.map(o => (
                  <button key={o.value}
                    className={"sp-btn " + ((styleVariants[v.key] || v.options[0].value) === o.value ? "sp-btn-primary" : "sp-btn-ghost")}
                    style={{ fontSize: "10px", padding: "4px 10px" }}
                    onClick={() => onStyleVariant(v.key, o.value)}>
                    {o.label}
                  </button>
                ))}
              </div>
            </div>
          ))}
        </div>
      )}

      {/* Developer Mode */}
      <div className="sp-section">
        <div className="sp-label">Developer Mode</div>
        {!devMode ? (
          <div className="dev-gate">
            <input type="password" placeholder="Enter dev password" value={devPw}
              onChange={e => setDevPw(e.target.value)}
              onKeyDown={e => e.key === "Enter" && tryUnlock()} />
            <button className="sp-btn sp-btn-primary" onClick={tryUnlock} style={{ width: "100%" }}>Unlock</button>
            {devErr && <div style={{ color: "var(--danger)", fontSize: "11px", marginTop: 6 }}>Incorrect password</div>}
          </div>
        ) : (
          <div>
            <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 10 }}>
              <span className="dev-badge">DEV MODE ACTIVE</span>
            </div>
            <div style={{ fontSize: "11px", color: "var(--text-muted)", marginBottom: 8 }}>
              {annotationCount} annotation{annotationCount !== 1 ? "s" : ""} &mdash; click <strong style={{color:"#f59e0b"}}>+</strong> buttons on any element to annotate
            </div>
            <button className="sp-btn sp-btn-primary" onClick={onExport} style={{ width: "100%", marginBottom: 6 }}>Export Config + Annotations (JSON)</button>
            <button className="sp-btn sp-btn-ghost" onClick={onAnnClear} style={{ width: "100%", marginBottom: 6, color: "var(--danger)", borderColor: "var(--danger)" }}>Clear All Annotations</button>
            <button className="sp-btn sp-btn-ghost" onClick={onDevLock} style={{ width: "100%" }}>Lock Dev Mode</button>
          </div>
        )}
      </div>
    </div>
  );
}

/* ─── Form Page ─── */
function FormPage({ onSubmit }) {
  const [name, setName] = useState("Sarah Mitchell");
  const [address, setAddress] = useState("789 Hill Country Dr, Fredericksburg, TX 78624");
  const [email, setEmail] = useState("sarah.mitchell@email.com");
  const [phone, setPhone] = useState("(830) 555-4271");
  const [showDrop, setShowDrop] = useState(false);
  const [filtered, setFiltered] = useState([]);
  const [errors, setErrors] = useState({});
  const ref = useRef(null);

  useEffect(() => {
    const h = e => { if (ref.current && !ref.current.contains(e.target)) setShowDrop(false); };
    document.addEventListener("mousedown", h);
    return () => document.removeEventListener("mousedown", h);
  }, []);

  const onAddr = v => {
    setAddress(v);
    if (v.length >= 1) {
      const f = SAMPLE_ADDRESSES.filter(a => a.toLowerCase().includes(v.toLowerCase()));
      setFiltered(f.length ? f : SAMPLE_ADDRESSES.slice(0, 5));
      setShowDrop(true);
    } else setShowDrop(false);
  };

  const fmtPhone = v => {
    const d = v.replace(/\D/g, "").slice(0, 10);
    if (d.length >= 7) return "(" + d.slice(0,3) + ") " + d.slice(3,6) + "-" + d.slice(6);
    if (d.length >= 4) return "(" + d.slice(0,3) + ") " + d.slice(3);
    return d.length > 0 ? "(" + d : "";
  };

  const validate = () => {
    // Preview mode — no required fields, always allow submission
    setErrors({});
    return true;
  };

  const submit = () => { if (validate()) onSubmit({ name, address, email, phone }); };

  const inp = (err) => ({
    width: "100%", padding: "13px 15px", fontSize: "14px",
    border: "2px solid " + (err ? "var(--danger)" : "var(--border)"), borderRadius: "9px",
    outline: "none", fontFamily: "var(--f-body)", background: "var(--bg-input)",
    color: "var(--text-primary)", boxSizing: "border-box", transition: "border .2s, box-shadow .2s"
  });

  return (
    <div style={{ minHeight: "100vh", background: "var(--hero-bg)", display: "flex", flexDirection: "column", alignItems: "center" }}>
      <div style={{ width: "100%", background: "var(--accent)", padding: "6px 0", textAlign: "center", fontSize: "12px", fontWeight: 700, color: "var(--text-primary)", fontFamily: "var(--f-head)", letterSpacing: ".5px", display: "flex", justifyContent: "center", gap: "24px", flexWrap: "wrap" }}>
        <span>Top Rated Local Service</span>
        <span>Unlimited Data</span>
        <span>Connecting You Since '52</span>
      </div>
      <div style={{ flex: 1, display: "flex", alignItems: "center", justifyContent: "center", padding: "28px 16px 24px", width: "100%", maxWidth: "480px" }}>
        <div style={{ width: "100%" }}>
          <div style={{ textAlign: "center", marginBottom: 24 }}>
            <div style={{ display: "inline-block", background: "var(--accent-dim)", color: "var(--accent)", fontSize: "11px", fontWeight: 700, letterSpacing: "2px", textTransform: "uppercase", padding: "5px 14px", borderRadius: "16px", marginBottom: 10, fontFamily: "var(--f-head)" }}>Check Availability</div>
            <h1 style={{ color: "var(--hero-text)", fontSize: "clamp(24px,5vw,32px)", fontWeight: 800, margin: "0 0 6px", fontFamily: "var(--f-head)", lineHeight: 1.15 }}>Get Connected Today</h1>
            <p style={{ color: "var(--hero-muted)", fontSize: "14px", margin: 0 }}>See if high-speed internet is available at your address.</p>
          </div>
          <div style={{ background: "var(--bg-card)", borderRadius: "14px", padding: "28px 24px", boxShadow: "var(--shadow)" }}>
            <div style={{ marginBottom: 16 }}>
              <label style={{ display: "block", fontSize: "12px", fontWeight: 700, color: "var(--text-primary)", marginBottom: 5, fontFamily: "var(--f-head)" }}>Full Name</label>
              <input placeholder="John Smith" value={name} onChange={e => setName(e.target.value)} style={inp(errors.name)} />
            </div>
            <div style={{ marginBottom: 16, position: "relative" }} ref={ref}>
              <label style={{ display: "block", fontSize: "12px", fontWeight: 700, color: "var(--text-primary)", marginBottom: 5, fontFamily: "var(--f-head)" }}>Service Address</label>
              <input placeholder="Start typing your address..." value={address} onChange={e => onAddr(e.target.value)} onFocus={() => { if (address) setShowDrop(true); }} style={inp(errors.address)} />
              {showDrop && filtered.length > 0 && (
                <div style={{ position: "absolute", top: "100%", left: 0, right: 0, background: "var(--bg-card)", border: "2px solid var(--accent)", borderRadius: "9px", marginTop: 3, boxShadow: "0 10px 28px rgba(0,0,0,.12)", zIndex: 10, maxHeight: 200, overflow: "auto" }}>
                  {filtered.map((a, i) => (
                    <div key={i} onClick={() => { setAddress(a); setShowDrop(false); }}
                      style={{ padding: "11px 14px", cursor: "pointer", fontSize: "13px", color: "var(--text-primary)", borderBottom: i < filtered.length - 1 ? "1px solid var(--border)" : "none" }}>
                      {a}
                    </div>
                  ))}
                </div>
              )}
            </div>
            <div style={{ marginBottom: 16 }}>
              <label style={{ display: "block", fontSize: "12px", fontWeight: 700, color: "var(--text-primary)", marginBottom: 5, fontFamily: "var(--f-head)" }}>Email Address</label>

              <label style={{ display: "block", fontSize: "12px", fontWeight: 700, color: "var(--text-primary)", marginBottom: 5, fontFamily: "var(--f-head)" }}>Phone Number</label>
              <input type="tel" placeholder="(830) 555-1234" value={phone} onChange={e => setPhone(fmtPhone(e.target.value))} style={inp(false)} />
            </div>
            {errors.contact && <div style={{ background: "var(--danger-dim)", border: "1px solid var(--danger)", borderRadius: "7px", padding: "9px 12px", marginBottom: 14, fontSize: "12px", color: "var(--danger)" }}>Please provide an email or phone number.</div>}
            <button onClick={submit} style={{ width: "100%", padding: "15px", background: "var(--accent)", color: "var(--text-primary)", border: "none", borderRadius: "9px", fontSize: "15px", fontWeight: 700, cursor: "pointer", fontFamily: "var(--f-head)", letterSpacing: ".4px", boxShadow: "0 4px 14px var(--accent-dim)", transition: "all .2s" }}

            <p style={{ textAlign: "center", fontSize: "10px", color: "var(--text-muted)", marginTop: 10, lineHeight: 1.4 }}>By submitting, you agree to be contacted by Bee Creek Communications.</p>
          </div>
        </div>
      </div>
    </div>
  );

              border: p.popular ? "2px solid var(--text-primary)" : "1px solid var(--border)",
              position: "relative", transition: "all .25s",
              opacity: vis ? 1 : 0, transform: vis ? "none" : "translateY(16px)",
              transitionDelay: (i * .07 + .15) + "s",
              boxShadow: p.popular ? "0 8px 30px rgba(0,0,0,.08)" : "var(--shadow)"
          }}>
            {p.popular && (
              <div style={{ position: "absolute", top: -12, left: "50%", transform: "translateX(-50%)", background: "var(--text-primary)", color: "var(--bg-card)", fontSize: "10px", fontWeight: 700, padding: "4px 16px", borderRadius: "10px", letterSpacing: "1.2px", fontFamily: "var(--f-head)", whiteSpace: "nowrap" }}>MOST POPULAR</div>
            )}
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 2 }}>
              <div>
                <div style={{ fontSize: "19px", fontWeight: 800, color: "var(--text-primary)", fontFamily: "var(--f-head)" }}>{p.tier}</div>
                <div style={{ fontSize: "9px", fontWeight: 700, letterSpacing: "1.2px", color: "var(--text-muted)", fontFamily: "var(--f-head)" }}>{p.sub}</div>
              </div>
            </div>
            <div style={{ display: "flex", alignItems: "baseline", gap: 1, margin: "8px 0 2px" }}>
              <span style={{ fontSize: "12px", color: "var(--text-muted)", fontWeight: 600, alignSelf: "flex-start", marginTop: 4 }}>$</span>
              <span style={{ fontSize: "40px", fontWeight: 800, color: "var(--text-primary)", fontFamily: "var(--f-head)", lineHeight: 1 }}>{p.price.split(".")[0]}</span>
              <span style={{ fontSize: "15px", fontWeight: 700, color: "var(--text-primary)", fontFamily: "var(--f-head)" }}>.{p.price.split(".")[1]}</span>
              <span style={{ fontSize: "12px", color: "var(--text-muted)", marginLeft: 2 }}>/mo</span>
            </div>
            <div style={{ display: "inline-flex", alignItems: "center", gap: 4, color: "var(--success)", fontSize: "10px", fontWeight: 600, marginBottom: 12 }}>
              <span style={{ fontSize: "9px" }}>&#9679;</span> Unlimited Data
            </div>
            <Annotatable id={"speed-" + p.name.replace(/\s/g,"-")} label={p.name + " download speed (" + p.speed + " Mbps)"} devMode={devMode} {...ann} style={{ marginBottom: 6 }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 5 }}>
                <span style={{ fontSize: "10px", fontWeight: 600, color: "var(--text-muted)", letterSpacing: ".3px" }}>DOWNLOAD SPEED</span>
                <span style={{ fontSize: "14px", fontWeight: 800, color: "var(--text-primary)", fontFamily: "var(--f-head)" }}>{p.speed} Mbps</span>
              </div>
              <SpeedBars filled={p.bars} />
            </Annotatable>
            <Annotatable id={"upload-" + p.name.replace(/\s/g,"-")} label={p.name + " upload speed (" + p.upload + " Mbps)"} devMode={devMode} {...ann} style={{ marginBottom: 14 }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 5 }}>
                <span style={{ fontSize: "10px", fontWeight: 600, color: "var(--text-muted)", letterSpacing: ".3px" }}>UPLOAD SPEED</span>
                <span style={{ fontSize: "14px", fontWeight: 800, color: "var(--text-primary)", fontFamily: "var(--f-head)" }}>{p.upload} Mbps</span>
              </div>
              <UploadBars filled={Math.max(1, Math.floor(p.bars * .5))} />
            </Annotatable>
            <Annotatable id={"select-btn-" + p.name.replace(/\s/g,"-")} label={"Select " + p.tier + " button"} devMode={devMode} {...ann}>
              <button onClick={() => setLabelPlan(p)} style={{
                width: "100%", padding: "11px",
                background: p.popular ? "var(--text-primary)" : "var(--bg-secondary)",
                color: p.popular ? "var(--bg-card)" : "var(--text-primary)",
                border: p.popular ? "none" : "1px solid var(--border)",
                borderRadius: "9px", fontSize: "13px", fontWeight: 700,
                cursor: "pointer", fontFamily: "var(--f-head)",
                transition: "all .2s", letterSpacing: ".3px"
              }}
              onMouseEnter={e => e.target.style.opacity = ".85"}
              onMouseLeave={e => e.target.style.opacity = "1"}>
                {"Select " + p.tier}
              </button>
            </Annotatable>
            <button onClick={() => setLabelPlan(p)} style={{
              width: "100%", padding: "6px", background: "none", border: "none",
              color: "var(--link)", fontSize: "11px", fontWeight: 600, cursor: "pointer",
              fontFamily: "var(--f-head)", marginTop: 4
            }}>
              View Broadband Facts
            </button>
          </Annotatable>
        ))}
      </div>

      {/* View All Plans Table (dev-only) */}
      {devMode && !showAllPlansToggle && (
        <div style={{ textAlign: "center", padding: "4px 0 16px" }}>
          <button onClick={() => setShowAllTable(!showAllTable)} style={{
            background: "none", border: "1px solid var(--border)", borderRadius: "8px",
            padding: "8px 20px", fontSize: "12px", fontWeight: 600, color: "var(--text-secondary)",
            cursor: "pointer", fontFamily: "var(--f-head)"
          }}>
            {showAllTable ? "Show Fewer Plans" : "View All " + allPlansList.length + " Plans"}
          </button>
        </div>
      )}

      {showAllTable && devMode && !showAllPlansToggle && (
        <div style={{ maxWidth: 800, margin: "0 auto 20px", padding: "0 20px" }}>
          <div style={{ background: "var(--bg-card)", borderRadius: "12px", border: "1px solid var(--border)", overflow: "hidden" }}>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr 1fr auto", padding: "12px 20px", background: "var(--bg-secondary)", borderBottom: "1px solid var(--border)" }}>
              {["Plan", "Download", "Upload", "Price", ""].map((h, i) => (
                <div key={i} style={{ fontSize: "10px", fontWeight: 700, color: "var(--text-muted)", letterSpacing: "1px", fontFamily: "var(--f-head)" }}>{h}</div>
              ))}
            </div>
            {allPlansList.map((p, i) => (
              <div key={i} style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr 1fr auto", padding: "12px 20px", borderBottom: i < allPlansList.length - 1 ? "1px solid var(--border)" : "none", alignItems: "center" }}>
                <div style={{ fontSize: "13px", fontWeight: 700, color: "var(--text-primary)", fontFamily: "var(--f-head)" }}>{p.name}</div>
                <div style={{ fontSize: "13px", color: "var(--text-secondary)" }}>{p.speed} Mbps</div>
                <div style={{ fontSize: "13px", color: "var(--text-secondary)" }}>{p.upload} Mbps</div>
                <div style={{ fontSize: "13px", fontWeight: 700, color: "var(--text-primary)" }}>{"$" + p.price + "/mo"}</div>
                <button onClick={() => setLabelPlan(p)} style={{
                  background: "none", border: "1px solid var(--border)", borderRadius: "6px",
                  padding: "5px 10px", fontSize: "10px", fontWeight: 700, color: "var(--link)",
                  cursor: "pointer", fontFamily: "var(--f-head)", whiteSpace: "nowrap"
                }}>Facts</button>
              </div>
            ))}
          </div>
        </div>
      )}

      {/* Footer */}
      <div style={{ background: "var(--footer-bg)", padding: "28px 20px 20px" }}>
        <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(200px, 1fr))", gap: 24, maxWidth: 900, margin: "0 auto", textAlign: "center" }}>
          {[
            { t: "Local Support", d: "Real people right here in Central Texas. No massive call centers, just neighbors helping neighbors.", aid: "footer-local" },
            { t: "Unlimited Means Unlimited", d: "No data caps, no throttling, and no surprise overage fees. Just pure speed.", aid: "footer-unlimited" },
            { t: "Satisfaction Guaranteed", d: "30-Day Money-Back Guarantee. We're confident you'll love Bee Creek.", aid: "footer-guarantee" },
          ].map((b, i) => (
            <Annotatable key={i} id={b.aid} label={"Footer: " + b.t} devMode={devMode} {...ann}>
              <div style={{ fontSize: "14px", fontWeight: 700, color: "#fff", fontFamily: "var(--f-head)", marginBottom: 5 }}>{b.t}</div>
              <div style={{ fontSize: "12px", color: "var(--footer-text)", lineHeight: 1.6 }}>{b.d}</div>
            </Annotatable>
          ))}
        </div>

        <Annotatable id="footer-cta" label="Footer CTA (rep will reach out + phone)" devMode={devMode} {...ann}
          style={{ textAlign: "center", marginTop: 24, paddingTop: 20, borderTop: "1px solid rgba(255,255,255,.08)" }}>
          <p style={{ fontSize: "13px", color: "var(--footer-text)", margin: "0 0 4px" }}>A Bee Creek representative will reach out shortly to get you connected.</p>
          <a href="tel:8669901258" style={{ color: "var(--footer-accent)", fontWeight: 700, fontSize: "15px", textDecoration: "none", fontFamily: "var(--f-head)" }}>(866) 990-1258</a>
        </Annotatable>

        <div style={{
          maxWidth: 700, margin: "24px auto 0",
          display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(160px, 1fr))",
          gap: 20, paddingTop: 20, borderTop: "1px solid rgba(255,255,255,.08)"
        }}>
          <Annotatable id="footer-contact" label="Footer: Contact info (phone numbers, fax)" devMode={devMode} {...ann}>
            <div style={{ fontSize: "11px", fontWeight: 700, letterSpacing: "1px", color: "var(--footer-accent)", fontFamily: "var(--f-head)", marginBottom: 6 }}>CONTACT</div>
            <div style={{ fontSize: "12px", color: "var(--footer-text)", lineHeight: 1.8 }}>
              <div>Toll Free: <a href="tel:8669901258" style={{ color: "rgba(255,255,255,.7)", textDecoration: "none" }}>(866) 990-1258</a></div>
              <div>Local: <a href="tel:8309901258" style={{ color: "rgba(255,255,255,.7)", textDecoration: "none" }}>(830) 990-1258</a></div>
              <div>Fax: (830) 990-5088</div>
            </div>
          </Annotatable>
          <Annotatable id="footer-address" label="Footer: Physical address" devMode={devMode} {...ann}>
            <div style={{ fontSize: "11px", fontWeight: 700, letterSpacing: "1px", color: "var(--footer-accent)", fontFamily: "var(--f-head)", marginBottom: 6 }}>ADDRESS</div>
            <div style={{ fontSize: "12px", color: "var(--footer-text)", lineHeight: 1.8 }}>
              <div>603 FM 2093 Ste #1103</div>
              <div>Fredericksburg, TX 78624</div>
              <div>P.O. Box 1757</div>
            </div>
          </Annotatable>
          <Annotatable id="footer-hours" label="Footer: Business hours" devMode={devMode} {...ann}>
            <div style={{ fontSize: "11px", fontWeight: 700, letterSpacing: "1px", color: "var(--footer-accent)", fontFamily: "var(--f-head)", marginBottom: 6 }}>HOURS</div>
            <div style={{ fontSize: "12px", color: "var(--footer-text)", lineHeight: 1.8 }}>
              <div>Mon - Fri</div>
              <div>8:00 AM - 5:00 PM</div>
              <div style={{ color: "var(--footer-accent)", fontSize: "11px", fontWeight: 600 }}>After Hours Support Available</div>
            </div>
          </Annotatable>
        </div>

        <div style={{ textAlign: "center", marginTop: 24, paddingTop: 16, borderTop: "1px solid rgba(255,255,255,.06)" }}>
          <div style={{ fontSize: "16px", fontWeight: 800, color: "rgba(255,255,255,.4)", fontFamily: "var(--f-head)", letterSpacing: ".5px" }}>
            Bee Creek <span style={{ color: "rgba(255,255,255,.25)" }}>Communications</span>
          </div>
          <div style={{ fontSize: "11px", color: "var(--footer-accent)", fontFamily: "var(--f-head)", fontWeight: 600, marginTop: 4, letterSpacing: "1px" }}>Connecting You Since '52</div>
          <p style={{ fontSize: "10px", color: "rgba(255,255,255,.2)", marginTop: 4 }}>&copy; Bee Creek Communications, Inc. | All Rights Reserved</p>
        </div>
      </div>

      {/* Broadband Label Modal */}
      {labelPlan && (
        <BroadbandLabel
          plan={labelPlan}
          zoneFees={zone ? zone.fees : null}
          devMode={devMode}
          annotations={ann.annotations}
          onAnnSave={ann.onSave}
          onAnnDelete={ann.onDelete}
          onClose={() => setLabelPlan(null)}
        />
      )}
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════
   APP — Root Component
   ═══════════════════════════════════════════════════════════ */

function App() {
  const [page, setPage] = useState("form");
  const [userData, setUserData] = useState(null);
  const [theme, setTheme] = useState(() => localStorage.getItem("bcc_theme") || "beecreek");
  const [customColors, setCustomColors] = useState(() => {
    try { return JSON.parse(localStorage.getItem("bcc_custom_colors")) || {}; } catch { return {}; }
  });
  const [devMode, setDevMode] = useState(() => localStorage.getItem("bcc_dev_mode") === "true");
  const [showAllPlans, setShowAllPlans] = useState(false);
  const [currentZone, setCurrentZone] = useState("zone1");
  const [zones, setZones] = useState(() => {
    try { const saved = localStorage.getItem("bcc_zone_config"); return saved ? JSON.parse(saved) : deepClone(DEFAULT_ZONE_CONFIG); }
    catch { return deepClone(DEFAULT_ZONE_CONFIG); }
  });
  const [plans, setPlans] = useState(() => {
    try { const saved = localStorage.getItem("bcc_plans"); return saved ? JSON.parse(saved) : deepClone(DEFAULT_PLANS); }
    catch { return deepClone(DEFAULT_PLANS); }
  });
  const [settingsOpen, setSettingsOpen] = useState(false);
  const [annotations, setAnnotations] = useState(() => loadAnnotations());
  const [styleVariants, setStyleVariants] = useState(() => {
    try { return JSON.parse(localStorage.getItem("bcc_style_variants")) || {}; } catch { return {}; }
  });

  // Apply theme
  useEffect(() => {
    document.documentElement.setAttribute("data-theme", theme);
    localStorage.setItem("bcc_theme", theme);
  }, [theme]);

  // Apply custom colors
  useEffect(() => {
    localStorage.setItem("bcc_custom_colors", JSON.stringify(customColors));
  }, [customColors]);

  // Save dev mode
  useEffect(() => {
    localStorage.setItem("bcc_dev_mode", devMode ? "true" : "false");
  }, [devMode]);

  // Save zones + plans on edit
  useEffect(() => { localStorage.setItem("bcc_zone_config", JSON.stringify(zones)); }, [zones]);
  useEffect(() => { localStorage.setItem("bcc_plans", JSON.stringify(plans)); }, [plans]);

  const handleThemeChange = (t) => {
    // Clear custom colors when switching themes
    Object.keys(customColors).forEach(k => {
      const propMap = { accent: "--accent", bg: "--bg-primary", card: "--bg-card", text: "--text-primary" };
      if (propMap[k]) document.documentElement.style.removeProperty(propMap[k]);
    });
    setCustomColors({});
    setTheme(t);
  };

  const handleCustomColor = (key, prop, value) => {
    if (value === null) {
      document.documentElement.style.removeProperty(prop);
      setCustomColors(prev => { const n = { ...prev }; delete n[key]; return n; });
    } else {
      document.documentElement.style.setProperty(prop, value);
      // Auto-derive related properties
      if (prop === "--accent") {
        document.documentElement.style.setProperty("--accent-hover", value);
        document.documentElement.style.setProperty("--accent-dim", value + "22");
      }
      setCustomColors(prev => ({ ...prev, [key]: value }));
    }
  };

  const handleResetColors = () => {
    ["--accent", "--accent-hover", "--accent-dim", "--bg-primary", "--bg-card", "--text-primary"].forEach(p =>
      document.documentElement.style.removeProperty(p)
    );
    setCustomColors({});
  };

  const handleFeeEdit = (zoneId, feeType, idx, field, value) => {
    setZones(prev => {
      const next = deepClone(prev);
      next[zoneId].fees[feeType][idx][field] = value;
      return next;
    });
  };

  const handlePlanEdit = (planName, field, value) => {
    setPlans(prev => {
      const next = deepClone(prev);
      if (next[planName]) next[planName][field] = value;
      return next;
    });
  };

  const handleSubmit = (data) => {
    setUserData(data);
    setCurrentZone(getZoneForAddress(data.address, zones));
    setPage("congrats");
    window.scrollTo(0, 0);
  };

  // Annotation handlers
  const handleAnnSave = (annId, label, action, comment) => {
    setAnnotations(prev => {
      const next = prev.filter(a => a.id !== annId);
      next.push({ id: annId, label, action, comment, timestamp: new Date().toISOString() });
      saveAnnotations(next);
      return next;
    });
  };
  const handleAnnDelete = (annId) => {
    setAnnotations(prev => {
      const next = prev.filter(a => a.id !== annId);
      saveAnnotations(next);
      return next;
    });
  };
  const handleAnnClear = () => {
    if (!annotations.length || !confirm("Clear all " + annotations.length + " annotations?")) return;
    setAnnotations([]);
    saveAnnotations([]);
  };

  // Style variants
  const handleStyleVariant = (key, value) => {
    setStyleVariants(prev => {
      const next = { ...prev, [key]: value };
      localStorage.setItem("bcc_style_variants", JSON.stringify(next));
      return next;
    });
  };

  useEffect(() => {
    const el = document.documentElement;
    const sv = styleVariants;
    // Card style
    el.style.setProperty("--card-radius", sv.corners === "sharp" ? "4px" : sv.corners === "pill" ? "22px" : "14px");
    el.style.setProperty("--card-border-w", sv.cardStyle === "bordered" ? "2px" : "1px");
    el.style.setProperty("--card-shadow", sv.cardStyle === "flat" ? "none" : sv.cardStyle === "raised" ? "0 8px 30px rgba(0,0,0,.12)" : sv.cardStyle === "glass" ? "0 8px 32px rgba(0,0,0,.08)" : "");
    el.style.setProperty("--card-backdrop", sv.cardStyle === "glass" ? "blur(12px)" : "none");
    el.style.setProperty("--card-bg-opacity", sv.cardStyle === "glass" ? "0.7" : "1");
    // Footer style overrides
    if (sv.footerStyle === "light") {
      el.style.setProperty("--footer-bg", "var(--bg-secondary)");
      el.style.setProperty("--footer-text", "var(--text-secondary)");
      el.style.setProperty("--footer-accent", "var(--accent)");
    } else if (sv.footerStyle === "accent") {
      el.style.setProperty("--footer-bg", "var(--accent)");
      el.style.setProperty("--footer-text", "var(--text-primary)");
      el.style.setProperty("--footer-accent", "var(--text-primary)");
    } else if (sv.footerStyle === "match") {
      el.style.setProperty("--footer-bg", "var(--bg-primary)");
      el.style.setProperty("--footer-text", "var(--text-secondary)");
      el.style.setProperty("--footer-accent", "var(--accent)");
    } else {
      el.style.removeProperty("--footer-bg");
      el.style.removeProperty("--footer-text");
      el.style.removeProperty("--footer-accent");
    }
    // Hero style
    if (sv.heroStyle === "solid") {
      el.style.setProperty("--hero-bg", "var(--text-primary)");
    } else if (sv.heroStyle === "accent") {
      el.style.setProperty("--hero-bg", "var(--accent)");
      el.style.setProperty("--hero-text", "var(--text-primary)");
    } else {
      el.style.removeProperty("--hero-bg");
      el.style.removeProperty("--hero-text");
    }
    // Card layout
    document.body.setAttribute("data-card-layout", sv.cardLayout || "grid");
  }, [styleVariants]);

  const exportConfig = () => {
    const config = {
      exportDate: new Date().toISOString(),
      version: "v2.0.0",
      theme,
      customColors,
      styleVariants,
      zones,
      plans,
      annotations
    };
    const blob = new Blob([JSON.stringify(config, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = "bcc_config_" + new Date().toISOString().split("T")[0] + ".json";
    a.click();
    URL.revokeObjectURL(url);
  };

  const toggleSettings = () => {
    const next = !settingsOpen;
    setSettingsOpen(next);
    document.getElementById("backdrop").classList.toggle("show", next);
  };

  // Re-apply custom colors on mount
  useEffect(() => {
    const propMap = { accent: "--accent", bg: "--bg-primary", card: "--bg-card", text: "--text-primary" };
    Object.entries(customColors).forEach(([key, val]) => {
      if (propMap[key] && val) {
        document.documentElement.style.setProperty(propMap[key], val);
        if (key === "accent") {
          document.documentElement.style.setProperty("--accent-hover", val);
          document.documentElement.style.setProperty("--accent-dim", val + "22");
        }
      }
    });
  }, []);

  return (
    <>
      {/* Gear Button */}
      <button id="gear-btn" className={settingsOpen ? "active" : ""} onClick={toggleSettings}>&#9881;</button>

      {/* Settings Panel */}
      <SettingsPanel
        isOpen={settingsOpen}
        theme={theme}
        customColors={customColors}
        styleVariants={styleVariants}
        devMode={devMode}
        annotationCount={annotations.length}
        onThemeChange={handleThemeChange}
        onCustomColor={handleCustomColor}
        onResetColors={handleResetColors}
        onStyleVariant={handleStyleVariant}
        onDevUnlock={() => setDevMode(true)}
        onDevLock={() => setDevMode(false)}
        onAnnClear={handleAnnClear}
        onExport={exportConfig}
        onClose={toggleSettings}
      />

      {/* Dev floating controls */}
      {devMode && annotations.length > 0 && (
        <div className="ann-count">{annotations.length} annotation{annotations.length !== 1 ? "s" : ""}</div>
      )}
      {devMode && (
        <button onClick={exportConfig} style={{
          position: "fixed", bottom: 16, right: 16, zIndex: 10000,
          background: "#facc15", color: "#1a1a2e", border: "none", borderRadius: "8px",
          padding: "10px 16px", fontSize: "12px", fontWeight: 800, fontFamily: "var(--f-head)",
          cursor: "pointer", boxShadow: "0 4px 12px rgba(0,0,0,.2)", letterSpacing: ".5px"
        }}>
          Export JSON
        </button>
      )}

      {/* Pages */}
      {page === "form"
        ? <FormPage onSubmit={handleSubmit} />
        : <CongratsPage
            userData={userData}
            currentZone={currentZone}
            zones={zones}
            plans={plans}
            devMode={devMode}
            showAllPlansToggle={showAllPlans}
            onZoneChange={setCurrentZone}
            onToggleShowAll={() => setShowAllPlans(p => !p)}
            onFeeEdit={handleFeeEdit}
            onPlanEdit={handlePlanEdit}
            annotations={annotations}
            onAnnSave={handleAnnSave}
            onAnnDelete={handleAnnDelete}
          />
      }
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
