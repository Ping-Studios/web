<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ping Studios — Sales Intelligence Apps</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; background:#f8f9fa; color:#1a1a2e; min-height:100vh; display:flex; align-items:center; justify-content:center; }
  .container { max-width:480px; width:90%; }
  h1 { font-size:20px; font-weight:700; margin-bottom:4px; }
  .subtitle { font-size:13px; color:#666; margin-bottom:24px; }
  .card { display:block; padding:16px 20px; background:#fff; border:1px solid #e0e0e0; border-radius:10px; margin-bottom:10px; text-decoration:none; color:inherit; transition:border-color .2s, box-shadow .2s; }
  .card:hover { border-color:#4a9eff; box-shadow:0 2px 8px rgba(74,158,255,0.15); }
  .card-name { font-size:15px; font-weight:600; }
  .card-detail { font-size:12px; color:#888; margin-top:2px; }
</style>
</head>
<body>
<div class="container">
  <h1>Ping Studios</h1>
  <p class="subtitle">Sales Intelligence Apps</p>
  <a href="alamo/" class="card">
    <div class="card-name">Alamo Broadband</div>
    <div class="card-detail">San Antonio, TX — Standard + Mining modes</div>
  </a>
  <a href="mojo/" class="card">
    <div class="card-name">Mojo Broadband</div>
    <div class="card-detail">Phoenix/Scottsdale, AZ — Standard + Mining modes</div>
  </a>
  <a href="jcwifi/" class="card">
    <div class="card-name">JC WiFi (Ping Broadband)</div>
    <div class="card-detail">Freeport, IL — Standard mode</div>
  </a>
</div>
</body>
</html>
